name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t prod-app ./app

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Tag Image
      run: docker tag prod-app ${{ secrets.DOCKER_USERNAME }}/prod-app:v1

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/prod-app:v1